<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Log in — Keyhole</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="auth-card">
    <div class="auth-card__brand">
      <div class="auth-card__mark"></div>
      <span>KEYHOLE</span>
    </div>
    <h1>Welcome back</h1>
    <p class="auth-card__subtitle">Log in to reach your dashboard.</p>

    <div class="form-error" id="formError"></div>

    <form id="loginForm" novalidate>
      <div class="field">
        <label for="identifier">Username or email</label>
        <input type="text" id="identifier" required autocomplete="username" />
      </div>
      <div class="field field-password-wrap">
        <label for="password">Password</label>
        <input type="password" id="password" required autocomplete="current-password" />
        <button type="button" class="toggle-password" id="togglePassword">👁</button>
      </div>
      <div class="remember-row">
        <label><input type="checkbox" id="remember" /> Remember me</label>
        <a href="forgot-password.html">Forgot password?</a>
      </div>
      <button type="submit" class="btn-primary">Log in</button>
    </form>

    <p class="auth-card__footer">New here? <a href="register.html">Create an account</a></p>
  </div>

  <script src="js/auth.js"></script>
  <script>
    const form = document.getElementById('loginForm');
    const errorBox = document.getElementById('formError');
    const passwordInput = document.getElementById('password');
    const toggleBtn = document.getElementById('togglePassword');

    if (Auth.getSession()) window.location.href = 'dashboard.html';

    toggleBtn.addEventListener('click', () => {
      const isPassword = passwordInput.type === 'password';
      passwordInput.type = isPassword ? 'text' : 'password';
      toggleBtn.textContent = isPassword ? '🙈' : '👁';
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorBox.classList.remove('is-visible');

      const identifier = document.getElementById('identifier').value.trim();
      const password = passwordInput.value;
      const remember = document.getElementById('remember').checked;

      try {
        await Auth.login({ identifier, password, remember });
        window.location.href = 'dashboard.html';
      } catch (err) {
        errorBox.textContent = err.message;
        errorBox.classList.add('is-visible');
      }
    });
  </script>
</body>
</html>
