<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Reset password — Keyhole</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="auth-card">
    <div class="auth-card__brand">
      <div class="auth-card__mark"></div>
      <span>KEYHOLE</span>
    </div>
    <h1>Reset your password</h1>
    <p class="auth-card__subtitle">Confirm your username and email to set a new password.</p>

    <div class="form-error" id="formError"></div>
    <div class="form-success" id="formSuccess"></div>

    <form id="resetForm" novalidate>
      <div class="field">
        <label for="username">Username</label>
        <input type="text" id="username" required autocomplete="username" />
      </div>
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" required autocomplete="email" />
      </div>
      <div class="field field-password-wrap">
        <label for="newPassword">New password</label>
        <input type="password" id="newPassword" required autocomplete="new-password" />
        <button type="button" class="toggle-password" id="togglePassword">👁</button>
        <small style="display:block; margin-top:6px; color:var(--muted); font-size:0.75rem;">At least 8 characters, including 1 number.</small>
      </div>
      <button type="submit" class="btn-primary">Reset password</button>
    </form>

    <p class="auth-card__footer"><a href="login.html">← Back to login</a></p>
  </div>

  <script src="js/auth.js"></script>
  <script>
    const form = document.getElementById('resetForm');
    const errorBox = document.getElementById('formError');
    const successBox = document.getElementById('formSuccess');
    const passwordInput = document.getElementById('newPassword');
    const toggleBtn = document.getElementById('togglePassword');

    toggleBtn.addEventListener('click', () => {
      const isPassword = passwordInput.type === 'password';
      passwordInput.type = isPassword ? 'text' : 'password';
      toggleBtn.textContent = isPassword ? '🙈' : '👁';
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorBox.classList.remove('is-visible');
      successBox.classList.remove('is-visible');

      const username = document.getElementById('username').value.trim();
      const email = document.getElementById('email').value.trim();
      const newPassword = passwordInput.value;

      try {
        await Auth.resetPassword({ username, email, newPassword });
        successBox.textContent = 'Password reset! Redirecting to login…';
        successBox.classList.add('is-visible');
        form.reset();
        setTimeout(() => { window.location.href = 'login.html'; }, 1200);
      } catch (err) {
        errorBox.textContent = err.message;
        errorBox.classList.add('is-visible');
      }
    });
  </script>
</body>
</html>
