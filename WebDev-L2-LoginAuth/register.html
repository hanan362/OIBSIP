<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Create account — Keyhole</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="auth-card">
    <div class="auth-card__brand">
      <div class="auth-card__mark"></div>
      <span>KEYHOLE</span>
    </div>
    <h1>Create your account</h1>
    <p class="auth-card__subtitle">Takes about 30 seconds.</p>

    <div class="form-error" id="formError"></div>
    <div class="form-success" id="formSuccess"></div>

    <form id="registerForm" novalidate>
      <div class="field">
        <label for="username">Username</label>
        <input type="text" id="username" required autocomplete="username" />
      </div>
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" required autocomplete="email" />
      </div>
      <div class="field field-password-wrap">
        <label for="password">Password</label>
        <input type="password" id="password" required autocomplete="new-password" />
        <button type="button" class="toggle-password" id="togglePassword">👁</button>
        <div class="strength-meter" id="strengthMeter">
          <div class="strength-meter__bar"></div>
          <div class="strength-meter__bar"></div>
          <div class="strength-meter__bar"></div>
          <div class="strength-meter__bar"></div>
          <div class="strength-meter__bar"></div>
        </div>
        <span class="strength-label" id="strengthLabel">At least 8 characters, including 1 number.</span>
      </div>
      <button type="submit" class="btn-primary">Register</button>
    </form>

    <p class="auth-card__footer">Already have an account? <a href="login.html">Log in</a></p>
  </div>

  <script src="js/auth.js"></script>
  <script>
    const form = document.getElementById('registerForm');
    const errorBox = document.getElementById('formError');
    const successBox = document.getElementById('formSuccess');
    const passwordInput = document.getElementById('password');
    const toggleBtn = document.getElementById('togglePassword');
    const bars = document.querySelectorAll('#strengthMeter .strength-meter__bar');
    const strengthLabel = document.getElementById('strengthLabel');

    if (Auth.getSession()) window.location.href = 'dashboard.html';

    toggleBtn.addEventListener('click', () => {
      const isPassword = passwordInput.type === 'password';
      passwordInput.type = isPassword ? 'text' : 'password';
      toggleBtn.textContent = isPassword ? '🙈' : '👁';
    });

    passwordInput.addEventListener('input', () => {
      const { score, label } = Auth.passwordStrength(passwordInput.value);
      bars.forEach((bar, i) => {
        bar.className = 'strength-meter__bar' + (i < score ? ` is-filled-${score}` : '');
      });
      strengthLabel.textContent = passwordInput.value ? label : 'At least 8 characters, including 1 number.';
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorBox.classList.remove('is-visible');
      successBox.classList.remove('is-visible');

      const username = document.getElementById('username').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = passwordInput.value;

      try {
        await Auth.register({ username, email, password });
        successBox.textContent = 'Account created! Redirecting to login…';
        successBox.classList.add('is-visible');
        form.reset();
        bars.forEach((bar) => { bar.className = 'strength-meter__bar'; });
        setTimeout(() => { window.location.href = 'login.html'; }, 1200);
      } catch (err) {
        errorBox.textContent = err.message;
        errorBox.classList.add('is-visible');
      }
    });
  </script>
</body>
</html>
